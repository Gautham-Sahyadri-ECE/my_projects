<!DOCTYPE html>
<html>
<head>
  <title>Birthday Surprise 🎉</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      color: white;
      overflow-x: hidden;
    }

    h1 {
      font-size: 52px;
      margin-top: 80px;
    }

    input {
      padding: 15px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      margin-top: 20px;
      width: 260px;
    }

    button {
      padding: 15px 25px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      background: white;
      color: #6a5acd;
      cursor: pointer;
      margin-left: 10px;
      font-weight: bold;
    }

    #output {
      margin-top: 30px;
      font-size: 32px;
      min-height: 70px;
    }

    #cake {
      display: none;
      width: 240px;
      margin: 30px auto;
      animation: pop 1s ease;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    #finalMsg {
      display: none;
      font-size: 32px;
      margin-top: 15px;
      font-weight: bold;
      line-height: 1.5;
    }

    /* Gift button */
    #giftBtn {
      display: none;
      margin-top: 20px;
      font-size: 22px;
      background: gold;
      color: black;
    }

    /* Video */
    #videoContainer {
      display: none;
      margin-top: 20px;
    }

    /* Confetti blast */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: white;
      top: 50%;
      animation: blast 1s ease-out forwards;
    }

    @keyframes blast {
      0% { transform: translate(0,0); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)); opacity: 0; }
    }

    /* Floating emojis */
    .emoji {
      position: fixed;
      bottom: -20px;
      font-size: 24px;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-110vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h1>🎉 Enter your name 🎉</h1>

<input type="text" id="nameInput" placeholder="Type here">
<button onclick="startSystem()">Start</button>

<div id="output"></div>

<img id="cake" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png">

<div id="finalMsg">
  happy birthday darrling 🎉<br>
  happy birthday Pallu 🎂
</div>

<button id="giftBtn" onclick="openGift()">🎁 Unbox</button>

<div id="videoContainer" style="display:none; width:80%; max-width:800px; margin:20px auto;">
  <iframe id="driveVideo"
  style="width:100%; height:450px; border-radius:12px; box-shadow: 0 0 30px rgba(0,0,0,0.5);"
  src=""
  frameborder="0"
  allow="autoplay">
</iframe>
</div>

<script>
const FILE_ID = "154DXdthZP7Kqi2jrBSkhviMRHCBjRun8";

function typeText(text, callback) {
  let i = 0;
  let output = document.getElementById("output");
  output.innerHTML = "";

  let interval = setInterval(() => {
    output.innerHTML += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      if (callback) setTimeout(callback, 700);
    }
  }, 35);
}

function createConfetti() {
  for (let i = 0; i < 70; i++) {
    let c = document.createElement("div");
    c.className = "confetti";

    let side = Math.random() < 0.5 ? 0 : window.innerWidth;
    c.style.left = side + "px";
    c.style.top = (window.innerHeight / 2) + "px";

    let x = (Math.random() * 600 - 300) + "px";
    let y = (Math.random() * 600 - 300) + "px";

    c.style.setProperty('--x', x);
    c.style.setProperty('--y', y);

    document.body.appendChild(c);

    setTimeout(() => c.remove(), 1000);
  }
}

function createFloatingEmojis() {
  const emojis = ["🎉","🎊","🎂","🥳"];
  setInterval(() => {
    let e = document.createElement("div");
    e.className = "emoji";
    e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(e);

    setTimeout(() => e.remove(), 5000);
  }, 300);
}

function openGift() {
  let container = document.getElementById("videoContainer");
  let video = document.getElementById("driveVideo");

  container.style.display = "block";

  // autoplay + slight delay ensures proper loading
  video.src = "https://drive.google.com/file/d/" + FILE_ID + "/preview";

  // hide button after clicking (clean UI)
  document.getElementById("giftBtn").style.display = "none";
}

function startSystem() {
  let name = document.getElementById("nameInput").value.trim().toLowerCase();

  if (name === "pallavi") {

    typeText("Initializing...", () => {
      typeText("Scanning...", () => {
        typeText("Matching...", () => {
          typeText("Match Found: Pallavi 🎉", () => {

            document.getElementById("cake").style.display = "block";
            document.getElementById("finalMsg").style.display = "block";
            document.getElementById("giftBtn").style.display = "inline-block";

            createConfetti();
            createFloatingEmojis();

          });
        });
      });
    });

  } else {
    document.getElementById("output").innerHTML = "Try again 🙂";
  }
}
</script>

</body>
</html>
